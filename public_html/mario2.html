<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>B.F.G.D Mini-Mario</title>
<link rel="icon" href="favicon.png">
<style>
  @import url('https://fonts.cdnfonts.com/css/retro-mario');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #222;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Retro Mario', sans-serif;
  }

  #game-container {
    width: 800px; height: 420px;
    background: #5c94fc;
    position: relative; overflow: hidden;
    border: 4px solid #333; border-radius: 4px;
  }

  #world {
    position: absolute; bottom: 0; left: 0;
    width: 4000px; height: 420px;
  }

  .ground-segment {
    position: absolute; bottom: 0; height: 60px;
    background: repeating-linear-gradient(90deg,#c84c0c 0px,#c84c0c 46px,#a03800 46px,#a03800 50px);
    border-top: 4px solid #e86030;
  }

  /* ── Mario ── */
  #mario { position: absolute; width: 32px; height: 48px; z-index: 10; }
  #mario .hat        { position:absolute; top:0; left:4px; width:24px; height:10px; background:#e00; border-radius:4px 4px 0 0; }
  #mario .hat::after { content:''; position:absolute; bottom:0; left:-4px; width:32px; height:4px; background:#e00; }
  #mario .face       { position:absolute; top:10px; left:4px; width:24px; height:14px; background:#f8b878; border-radius:4px; }
  #mario .eye        { position:absolute; top:14px; left:8px; width:6px; height:6px; background:#222; border-radius:50%; }
  #mario .mustache   { position:absolute; top:21px; left:2px; width:28px; height:5px; background:#8b3a00; border-radius:3px; }
  #mario .shirt      { position:absolute; top:26px; left:2px; width:28px; height:12px; background:#e00; }
  #mario .overalls   { position:absolute; top:34px; left:0; width:32px; height:10px; background:#1a3aff; }
  #mario .shoe-l     { position:absolute; bottom:0; left:0; width:13px; height:6px; background:#6b2a00; border-radius:2px; }
  #mario .shoe-r     { position:absolute; bottom:0; right:0; width:13px; height:6px; background:#6b2a00; border-radius:2px; }

  /* ── Blocs ── */
  .block {
    position: absolute; width: 48px; height: 48px;
    background: #c84c0c; border: 3px solid #7a2a00;
    border-radius: 2px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #ffcc00; transition: transform 0.05s;
  }
  .block.brick::before {
    content:''; position:absolute; inset:0;
    background:
      repeating-linear-gradient(0deg,transparent 0,transparent 14px,rgba(0,0,0,.25) 14px,rgba(0,0,0,.25) 16px),
      repeating-linear-gradient(90deg,transparent 0,transparent 22px,rgba(0,0,0,.25) 22px,rgba(0,0,0,.25) 24px);
  }
  .block.coin { background: #c87800; }
  .block.coin::after { content:'?'; }
  .block.coin.used { background:#888; }
  .block.coin.used::after { content:''; }

  /* ── Pièce flottante ── */
  .floating-coin {
    position: absolute; color: #ffcc00; font-size: 22px; font-weight: bold;
    pointer-events: none; z-index: 50; text-shadow: 2px 2px #000;
    animation: floatUp 0.7s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity:1; transform:translateY(0); }
    100% { opacity:0; transform:translateY(-60px); }
  }

  /* ── Tuyaux ── */
  .pipe { position: absolute; bottom: 60px; }
  .pipe .pipe-body { position:absolute; bottom:0; left:8px; width:48px; background:#2eb82e; border:3px solid #1a7a1a; }
  .pipe .pipe-top  { position:absolute; bottom:0; left:0; width:64px; height:20px; background:#2eb82e; border:3px solid #1a7a1a; border-radius:4px 4px 0 0; }

  /* ── Drapeau ── */
  .flag-pole { position:absolute; bottom:60px; width:6px; background:#888; height:220px; }
  .flag-flag { position:absolute; top:0; left:6px; width:36px; height:24px; background:#2eb82e; border:2px solid #1a7a1a; }

  /* ── HUD ── */
  #hud {
    position:absolute; top:8px; left:0; width:100%;
    display:flex; justify-content:space-around;
    color:white; font-size:13px; z-index:20;
    pointer-events:none; text-shadow:2px 2px #000;
  }

  /* ── Overlay ── */
  #overlay {
    position:absolute; inset:0; background:rgba(0,0,0,.7);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; z-index:30; color:#fff; text-shadow:3px 3px #000;
  }
  #overlay h1 { font-size:30px; }
  #overlay p  { font-size:14px; }

  #level-select { display:flex; gap:24px; margin-top:8px; flex-wrap:wrap; justify-content:center; }
  .level-card {
    background:#994e00; border:4px solid #ffcc00; border-radius:8px; padding:20px 28px;
    cursor:pointer; text-align:center; transition:transform 0.1s, background 0.1s;
    color:#fff; text-shadow:2px 2px #000;
  }
  .level-card:hover { background:#c86000; transform:scale(1.07); }
  .level-card .level-num { font-size:26px; }
  .level-card .level-sub { font-size:11px; margin-top:6px; color:#ffcc00; }

  .btn-action {
    background:#e00; color:#fff; border:3px solid #800;
    padding:10px 32px; font-size:15px; cursor:pointer;
    border-radius:4px; font-family:inherit; margin-top:4px;
  }
  .btn-action:hover { background:#c00; }
  .btn-action.green { background:#2a8a00; border-color:#185000; }
  .btn-action.green:hover { background:#1a6000; }

  /* ── Goomba ── */
  .goomba {
    position:absolute; width:38px; height:36px;
    background:#8b3a00; border-radius:50% 50% 38% 38%;
    border:2px solid #4a1800; z-index:5;
  }
  .goomba::before { content:''; position:absolute; top:7px; left:4px; width:11px; height:9px; background:#2a0800; border-radius:50%; }
  .goomba::after  { content:''; position:absolute; top:7px; right:4px; width:11px; height:9px; background:#2a0800; border-radius:50%; }

  /* ── Koopa (debout) ── */
  .koopa {
    position:absolute; width:36px; height:48px; z-index:5;
  }
  /* Corps vert */
  .koopa .k-shell  { position:absolute; bottom:10px; left:2px; width:32px; height:28px; background:#4a9a00; border-radius:50% 50% 40% 40%; border:2px solid #2a6a00; }
  /* Carapace dessin */
  .koopa .k-shell::after { content:''; position:absolute; top:4px; left:6px; width:20px; height:14px; background:#6abe00; border-radius:40%; border:1px solid #2a6a00; }
  /* Tête */
  .koopa .k-head   { position:absolute; top:0; left:6px; width:24px; height:18px; background:#f8d070; border-radius:50% 50% 30% 30%; border:2px solid #c8a030; }
  /* Yeux */
  .koopa .k-eye    { position:absolute; top:4px; left:5px; width:6px; height:6px; background:#fff; border-radius:50%; border:1px solid #222; }
  .koopa .k-eye::after { content:''; position:absolute; top:1px; left:1px; width:3px; height:3px; background:#222; border-radius:50%; }
  /* Pattes */
  .koopa .k-leg-l  { position:absolute; bottom:0; left:2px; width:10px; height:12px; background:#4a9a00; border-radius:2px; }
  .koopa .k-leg-r  { position:absolute; bottom:0; right:2px; width:10px; height:12px; background:#4a9a00; border-radius:2px; }
  /* Pieds */
  .koopa .k-foot-l { position:absolute; bottom:0; left:0; width:14px; height:6px; background:#f8d070; border-radius:2px; border:1px solid #c8a030; }
  .koopa .k-foot-r { position:absolute; bottom:0; right:0; width:14px; height:6px; background:#f8d070; border-radius:2px; border:1px solid #c8a030; }

  /* ── Carapace (shell) ── */
  .shell {
    position:absolute; width:34px; height:28px; z-index:5;
    background:#4a9a00; border-radius:50%; border:3px solid #2a6a00;
  }
  .shell::before { content:''; position:absolute; top:4px; left:5px; width:24px; height:14px; background:#6abe00; border-radius:40%; border:1px solid #2a6a00; }
  /* croix caractéristique de la carapace */
  .shell::after  { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:2px; height:18px; background:rgba(0,0,0,.25); box-shadow:9px 0 0 rgba(0,0,0,.15); }

  /* carapace qui bouge → légère inclinaison animée */
  .shell.moving { animation: shellSpin 0.3s linear infinite; }
  @keyframes shellSpin {
    0%   { transform: rotate(-5deg); }
    50%  { transform: rotate(5deg);  }
    100% { transform: rotate(-5deg); }
  }

  #hint { position:absolute; bottom:6px; left:8px; color:#fff; font-size:10px; text-shadow:1px 1px #000; z-index:20; pointer-events:none; }

      { x:3350, w:64, h:140 },
    ],
    // Goombas sur segments de sol bien définis
    // sol 0→700, 850→1200, 1400→1750, 1950→2350, 2550→2900, 3050→4000
    goombas: [
      { x:250  },   // sol 0→700
      { x:1080 },   // sol 850→1200 (loin du tuyau 1300)
      { x:2150 },   // sol 1950→2350
      { x:3200 },   // sol 3050→4000
    ],
    // Koopas placés sur segments de sol
    koopas: [
      { x:400  },   // sol 0→700
      { x:950  },   // sol 850→1200
      { x:1550 },   // sol 1400→1750
      { x:2600 },   // sol 2550→2900
      { x:3500 },   // sol 3050→4000
    ],
    flagX: 3800, bgColor: '#2a5c3a',
  },
};

/* ===================================================================
   ÉTAT GLOBAL
=================================================================== */
let currentLevel = null;
let blockStates  = [];
let goombas      = [];
let koopas       = [];   // { el, x, startX, dir, alive }
let shells       = [];   // { el, x, dir, moving }   ← carapaces au sol
let mx, my, vy, prevY;
let onGround;
let score, coins;
let gameRunning = false;
let animId = null;
const keys = {};

/* ===================================================================
   CONSTRUCTION DU MONDE
=================================================================== */
function buildWorld(lvl) {
  const world = document.getElementById('world');
  world.innerHTML = '';
  document.getElementById('game-container').style.background = lvl.bgColor;
  document.getElementById('world-disp').textContent = 'MONDE ' + lvl.name;

  // Sol
  lvl.groundSegments.forEach(s => {
    const d = document.createElement('div');
    d.className = 'ground-segment';
    d.style.left  = s.x + 'px';
    d.style.width = s.w + 'px';
    world.appendChild(d);
  });

  // Blocs
  blockStates = lvl.blocks.map((b, i) => {
    const d = document.createElement('div');
    d.className = 'block ' + b.type;
    d.style.left   = b.x + 'px';
    d.style.bottom = (b.bottom + GROUND_H) + 'px';
    d.dataset.idx  = i;
    world.appendChild(d);
    return { el: d, used: false };
  });

  // Tuyaux
  lvl.pipes.forEach(p => {
    const pipe = document.createElement('div');
    pipe.className = 'pipe';
    pipe.style.left = p.x + 'px';
    const body = document.createElement('div');
    body.className = 'pipe-body'; body.style.height = p.h + 'px';
    const top = document.createElement('div');
    top.className = 'pipe-top'; top.style.bottom = p.h + 'px';
    pipe.appendChild(body); pipe.appendChild(top);
    world.appendChild(pipe);
  });

  // Goombas
  goombas = lvl.goombas.map(g => {
    const el = document.createElement('div');
    el.className = 'goomba';
    el.style.left   = g.x + 'px';
    el.style.bottom = GROUND_H + 'px';
    world.appendChild(el);
    return { el, x: g.x, startX: g.x, dir: -1, alive: true };
  });

  // Koopas
  koopas = (lvl.koopas || []).map(k => {
    const el = makeKoopaEl();
    el.style.left   = k.x + 'px';
    el.style.bottom = GROUND_H + 'px';
    world.appendChild(el);
    return { el, x: k.x, startX: k.x, dir: -1, alive: true };
  });

  // Carapaces (vide au départ)
  shells = [];

  // Drapeau
  const pole = document.createElement('div');
  pole.className = 'flag-pole'; pole.style.left = lvl.flagX + 'px';
  pole.appendChild(Object.assign(document.createElement('div'), { className: 'flag-flag' }));
  world.appendChild(pole);

  // Mario (toujours en dernier = z-index plus haut)
  const mario = document.createElement('div');
  mario.id = 'mario';
  mario.innerHTML = `<div class="hat"></div><div class="face"></div><div class="eye"></div>
    <div class="mustache"></div><div class="shirt"></div><div class="overalls"></div>
    <div class="shoe-l"></div><div class="shoe-r"></div>`;
  world.appendChild(mario);
}

function makeKoopaEl() {
  const el = document.createElement('div');
  el.className = 'koopa';
  el.innerHTML = `<div class="k-shell"></div><div class="k-head"></div>
    <div class="k-eye"></div><div class="k-leg-l"></div><div class="k-leg-r"></div>
    <div class="k-foot-l"></div><div class="k-foot-r"></div>`;
  return el;
}

function makeShellEl(x) {
  const el = document.createElement('div');
  el.className = 'shell';
  el.style.left   = x + 'px';
  el.style.bottom = GROUND_H + 'px';
  document.getElementById('world').appendChild(el);
  return el;
}

/* ===================================================================
   SÉLECTION / OVERLAY / START
=================================================================== */
function selectLevel(n) {
  currentLevel = LEVELS[n];
  buildWorld(currentLevel);
  resetGame();
  showOverlay('WORLD ' + currentLevel.name, '← → bouger &nbsp;|&nbsp; ↑ ou Espace sauter',
    'Jouer !', () => startGame());
}
window.selectLevel = selectLevel;

function showOverlay(title, sub, btnLabel, btnAction, btn2Label, btn2Action) {
  gameRunning = false;
  cancelAnimationFrame(animId);
  const o = document.getElementById('overlay');
  let html = `<h1>${title}</h1><p>${sub}</p>
    <button class="btn-action" id="overlay-btn1">${btnLabel}</button>`;
  if (btn2Label) html += `<button class="btn-action green" id="overlay-btn2">${btn2Label}</button>`;
  o.innerHTML = html;
  o.style.display = 'flex';
  document.getElementById('overlay-btn1').addEventListener('click', btnAction);
  if (btn2Label) document.getElementById('overlay-btn2').addEventListener('click', btn2Action);
}

function showLevelSelect() {
  const o = document.getElementById('overlay');
  o.innerHTML = `
    <h1>B.F.G.D Mini-Mario</h1><p>Choisis ton niveau !</p>
    <div id="level-select">
      <div class="level-card" onclick="selectLevel(1)"><div class="level-num">1-1</div><div class="level-sub">Monde 1</div></div>
      <div class="level-card" onclick="selectLevel(2)"><div class="level-num">2-2</div><div class="level-sub">Monde 2</div></div>
      <div class="level-card" onclick="selectLevel(3)"><div class="level-num">3-3</div><div class="level-sub">Monde 3</div></div>
    </div>
    <p style="font-size:11px;margin-top:4px;">← → bouger &nbsp;|&nbsp; ↑ ou Espace sauter</p>`;
  o.style.display = 'flex';
  gameRunning = false;
  cancelAnimationFrame(animId);
}

function resetGame() {
  mx = 100; my = 0; vy = 0; prevY = 0;
  onGround = false; score = 0; coins = 0;
  goombas.forEach(g => {
    g.x = g.startX; g.dir = -1; g.alive = true;
    g.el.style.display = 'block'; g.el.style.left = g.x + 'px';
  });
  koopas.forEach(k => {
    k.x = k.startX; k.dir = -1; k.alive = true;
    k.el.style.display = 'block'; k.el.style.left = k.x + 'px';
  });
  // Supprimer toutes les carapaces du DOM
  shells.forEach(s => s.el.remove());
  shells = [];
  blockStates.forEach((bs, i) => {
    bs.used = false;
    bs.el.className = 'block ' + currentLevel.blocks[i].type;
  });
  updateHUD();
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  gameRunning = true;
  cancelAnimationFrame(animId);
  loop();
}

function updateHUD() {
  document.getElementById('score-disp').textContent = String(score).padStart(6,'0');
  document.getElementById('coin-disp').textContent  = '🪙 x' + coins;
}

/* ===================================================================
   CLAVIER
=================================================================== */
document.addEventListener('keydown', e => {
  const k = e.key;
  if (!keys[k]) {
    keys[k] = true;
    if ((k === 'ArrowUp' || k === ' ') && onGround && gameRunning) {
      vy = JUMP_VEL; onGround = false;
    }
  }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(k)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

/* ===================================================================
   HELPERS PHYSIQUE
=================================================================== */
function getSolids() {
  if (!currentLevel) return [];
  const list = currentLevel.blocks.map(b => ({ x:b.x, y:b.bottom, w:b.w, h:b.h }));
  currentLevel.pipes.forEach(p => list.push({ x:p.x, y:0, w:p.w, h:p.h }));
  return list;
}

function isInHole(worldX, w) {
  if (!currentLevel) return false;
  const left = worldX + 4, right = worldX + w - 4;
  for (const h of currentLevel.holes) {
    if (right > h.x && left < h.x + h.w) return true;
  }
  return false;
}

function resolveHorizontal(solids, newX, curY) {
  const mB = curY, mT = curY + MARIO_H;
  for (const s of solids) {
    const sL = s.x, sR = s.x + s.w, sB = s.y, sT = s.y + s.h;
    if (mT <= sB || mB >= sT) continue;
    const mL = newX, mR = newX + MARIO_W;
    if (mR <= sL || mL >= sR) continue;
    const oL = mR - sL, oR = sR - mL;
    newX = (oL < oR) ? sL - MARIO_W : sR;
  }
  return newX;
}

function landingY(solids, newX, newY, oldY) {
  const mL = newX + 2, mR = newX + MARIO_W - 2;
  let best = null;
  for (const s of solids) {
    const sTop = s.y + s.h;
    if (mR <= s.x || mL >= s.x + s.w) continue;
    if (oldY >= sTop && newY < sTop) {
      if (best === null || sTop > best) best = sTop;
    }
  }
  return best;
}

function hitCeiling(solids, curX, newY) {
  const mT = newY + MARIO_H, mL = curX + 2, mR = curX + MARIO_W - 2;
  for (const s of solids) {
    if (mR <= s.x || mL >= s.x + s.w) continue;
    const sB = s.y;
    if (mT >= sB && mT < sB + 16) return sB - MARIO_H;
  }
  return null;
}

/* ===================================================================
   BLOCS ?
=================================================================== */
function checkBlockHit() {
  if (vy >= 0) return;
  const mL = mx + 4, mR = mx + MARIO_W - 4, mTop = my + MARIO_H;
  currentLevel.blocks.forEach((b, i) => {
    if (b.type !== 'coin') return;
    const bs = blockStates[i];
    if (bs.used) return;
    if (mR <= b.x || mL >= b.x + b.w) return;
    if (mTop >= b.bottom && mTop <= b.bottom + 12) {
      bs.used = true;
      bs.el.classList.add('used');
      bs.el.style.transform = 'translateY(-6px)';
      setTimeout(() => { bs.el.style.transform = ''; }, 100);
      spawnFloatingCoin(b.x + 8, b.bottom + b.h);
      coins++; score += 200; updateHUD();
      vy = 0; my = b.bottom - MARIO_H - 1;
    }
  });
}

function spawnFloatingCoin(worldX, worldBottomY) {
  const el = document.createElement('div');
  el.className = 'floating-coin'; el.textContent = '🪙';
  el.style.left = worldX + 'px';
  el.style.bottom = (GROUND_H + worldBottomY + 10) + 'px';
  el.style.position = 'absolute';
  document.getElementById('world').appendChild(el);
  setTimeout(() => el.remove(), 800);
}

/* ===================================================================
   UTILITAIRE : STOMP GÉNÉRIQUE
   Renvoie true si Mario est en train de sauter sur quelque chose
   (il descendait, et son bas est dans la moitié supérieure de l'objet)
=================================================================== */
function isStomping(objTop) {
  const marioDescend = prevY > my;
  const mBot = my;
  return marioDescend && mBot >= objTop * 0.55;
}

function gameOver(msg) {
  gameRunning = false;
  cancelAnimationFrame(animId);
  showOverlay('Game Over', msg, 'Recommencer', () => { resetGame(); startGame(); });
}

/* ===================================================================
   BOUCLE DE JEU
=================================================================== */
function loop() {
  if (!gameRunning || !currentLevel) return;

  const solids = getSolids();

  /* ── Horizontal ── */
  if (keys['ArrowRight']) mx += SPEED;
  if (keys['ArrowLeft'])  mx -= SPEED;
  mx = Math.max(0, Math.min(WORLD_W - MARIO_W, mx));
  mx = resolveHorizontal(solids, mx, my);

  /* ── Gravité & vertical ── */
  vy += GRAVITY;
  prevY = my;
  my -= vy;

  checkBlockHit();

  if (vy < 0) {
    const ceil = hitCeiling(solids, mx, my);
    if (ceil !== null) { my = ceil; vy = 1; }
  }
  if (vy > 0) {
    const land = landingY(solids, mx, my, prevY);
    if (land !== null) { my = land; vy = 0; onGround = true; }
  }
  if (my <= 0) {
    if (!isInHole(mx, MARIO_W)) { my = 0; vy = 0; onGround = true; }
    else { onGround = false; }
  }
  if (my < -FALL_KILL) { gameOver('Tu es tombé dans un trou !'); return; }

  /* ══════════════════════════════════════════════════════════════
     GOOMBAS
  ══════════════════════════════════════════════════════════════ */
  for (const g of goombas) {
    if (!g.alive) continue;
    g.x += g.dir * 1.5;
    if (g.x < 0 || isInHole(g.x, 38) || g.x > WORLD_W - 38) g.dir *= -1;
    g.el.style.left   = g.x + 'px';
    g.el.style.bottom = GROUND_H + 'px';

    const gL = g.x, gR = g.x + 38, gTop = 36;
    const mL = mx + 4, mR = mx + MARIO_W - 4;
    const overlapX = mR > gL && mL < gR;
    const overlapY = my + MARIO_H > 0 && my < gTop;

    if (overlapX && overlapY) {
      if (isStomping(gTop)) {
        g.alive = false; g.el.style.display = 'none';
        vy = JUMP_VEL * 0.55; my = gTop + 1; onGround = false;
        score += 100; updateHUD();
      } else { gameOver("Un Goomba t'a touché !"); return; }
    }
  }

  /* ══════════════════════════════════════════════════════════════
     KOOPAS
  ══════════════════════════════════════════════════════════════ */
  for (const k of koopas) {
    if (!k.alive) continue;
    k.x += k.dir * 1.2;
    if (k.x < 0 || isInHole(k.x, 36) || k.x > WORLD_W - 36) k.dir *= -1;
    k.el.style.left   = k.x + 'px';
    k.el.style.bottom = GROUND_H + 'px';
    // Flip visuel
    k.el.style.transform = k.dir < 0 ? 'scaleX(-1)' : 'scaleX(1)';

    const kL = k.x, kR = k.x + 36, kTop = 48;
    const mL = mx + 4, mR = mx + MARIO_W - 4;
    const overlapX = mR > kL && mL < kR;
    const overlapY = my + MARIO_H > 0 && my < kTop;

    if (overlapX && overlapY) {
      if (isStomping(kTop)) {
        // Koopa écrasé → devient une carapace immobile
        k.alive = false;
        k.el.style.display = 'none';
        const shell = { el: makeShellEl(k.x + 1), x: k.x + 1, dir: 0, moving: false };
        shells.push(shell);
        // Mario rebondit
        vy = JUMP_VEL * 0.55; my = 36 + 1; onGround = false;
        score += 200; updateHUD();
      } else { gameOver("Un Koopa t'a touché !"); return; }
    }
  }

  /* ══════════════════════════════════════════════════════════════
     CARAPACES
  ══════════════════════════════════════════════════════════════ */
  for (let si = shells.length - 1; si >= 0; si--) {
    const sh = shells[si];

    /* ── Déplacement si moving ── */
    if (sh.moving) {
      sh.x += sh.dir * SHELL_SPEED;
      // Rebondit sur murs du monde
      if (sh.x < 0) { sh.x = 0; sh.dir = 1; }
      if (sh.x > WORLD_W - 34) { sh.x = WORLD_W - 34; sh.dir = -1; }
      // Rebondit sur les bords des trous (ne tombe pas)
      if (isInHole(sh.x, 34)) { sh.dir *= -1; sh.x += sh.dir * SHELL_SPEED * 2; }
    }
    sh.el.style.left = sh.x + 'px';
    sh.el.classList.toggle('moving', sh.moving);

    /* ── La carapace tue les Goombas ── */
    if (sh.moving) {
      const shL = sh.x, shR = sh.x + 34;
      for (const g of goombas) {
        if (!g.alive) continue;
        if (g.x + 38 > shL && g.x < shR) {
          g.alive = false; g.el.style.display = 'none';
          score += 200; updateHUD();
          spawnFloatingCoin(g.x + 10, 36);
        }
      }
      /* ── La carapace tue les Koopas ── */
      for (const k of koopas) {
        if (!k.alive) continue;
        if (k.x + 36 > shL && k.x < shR) {
          k.alive = false; k.el.style.display = 'none';
          score += 200; updateHUD();
        }
      }
      /* ── La carapace rebondit sur les solides horizontalement ── */
      for (const s of solids) {
        if (sh.x + 34 > s.x && sh.x < s.x + s.w &&
            0 < s.y + s.h && 28 > s.y) {
          sh.dir *= -1;
          sh.x += sh.dir * SHELL_SPEED;
          break;
        }
      }
    }

    /* ── Collision Mario ↔ Carapace ── */
    const shL = sh.x, shR = sh.x + 34, shTop = 28;
    const mL  = mx + 4, mR = mx + MARIO_W - 4;
    const overlapX = mR > shL && mL < shR;
    const overlapY = my + MARIO_H > 0 && my < shTop;

    if (overlapX && overlapY) {
      if (isStomping(shTop)) {
        /* Mario saute sur la carapace */
        if (!sh.moving) {
          /* Carapace immobile → on la lance dans la direction du saut */
          // Si Mario est plus sur la gauche de la carapace → lance à droite
          const marioCenter  = mx + MARIO_W / 2;
          const shellCenter  = sh.x + 17;
          sh.dir    = marioCenter < shellCenter ? 1 : -1;
          sh.moving = true;
        } else {
          /* Carapace déjà en mouvement → stopper */
          sh.moving = false;
          sh.dir    = 0;
        }
        vy = JUMP_VEL * 0.55; my = shTop + 1; onGround = false;
        score += 100; updateHUD();
      } else {
        /* Contact latéral avec une carapace MOBILE → Game Over */
        if (sh.moving) { gameOver("Une carapace t'a touché !"); return; }
        /* Contact latéral avec carapace IMMOBILE →
           on la pousse dans la direction opposée à Mario */
        const marioCenter = mx + MARIO_W / 2;
        const shellCenter = sh.x + 17;
        sh.dir    = marioCenter < shellCenter ? 1 : -1;
        sh.moving = true;
      }
    }
  }

  /* ── Victoire ── */
  if (mx > currentLevel.flagX - 30) {
    gameRunning = false;
    cancelAnimationFrame(animId);
    showOverlay('Niveau terminé ! 🎉', 'Score : ' + String(score).padStart(6,'0'),
      'Changer de niveau', () => showLevelSelect());
    return;
  }

  /* ── Caméra ── */
  let camX = mx - VIEW_W * 0.35;
  camX = Math.max(0, Math.min(WORLD_W - VIEW_W, camX));
  document.getElementById('world').style.transform = `translateX(${-camX}px)`;

  /* ── Mario DOM ── */
  const marioEl = document.getElementById('mario');
  if (marioEl) {
    marioEl.style.left   = mx + 'px';
    marioEl.style.bottom = (GROUND_H + my) + 'px';
    if      (keys['ArrowLeft'])  marioEl.style.transform = 'scaleX(-1)';
    else if (keys['ArrowRight']) marioEl.style.transform = 'scaleX(1)';
  }

  animId = requestAnimationFrame(loop);
}

showLevelSelect();
</script>
</body>
</html>
